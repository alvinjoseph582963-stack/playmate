<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 160" width="500" height="160">
  <!-- Optimized transparent SVG version of the official PlayMate logo -->
  <rect width="500" height="160" fill="transparent"/>
  <!-- "playmate" in bold serif lowercase, matching the exact spacing and shape of the logo -->
  <text x="250" y="96" font-family="Georgia, 'Times New Roman', serif" font-size="94" font-weight="900" fill="#0b7a3e" text-anchor="middle" letter-spacing="-3">playmate</text>
  <!-- Tagline "FIND YOUR GAME PARTNER" in clean wide sans-serif -->
  <text x="250" y="132" font-family="'Montserrat', 'Century Gothic', 'Helvetica Neue', Arial, sans-serif" font-size="16.5" font-weight="700" fill="#0b7a3e" text-anchor="middle" letter-spacing="4.8">FIND YOUR GAME PARTNER</text>
</svg>
