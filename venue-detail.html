<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venue Details | PlayMate</title>
  <meta name="description" content="View venue details, available slots, and join to play with sports enthusiasts near you.">
  <link rel="stylesheet" href="styles/main.css">
  <style>
    .detail-page{padding-top:90px;padding-bottom:80px}
    .gallery-wrap{border-radius:var(--radius-xl);overflow:hidden;background:var(--bg-card);margin-bottom:40px}
    .gallery-main-img{width:100%;height:420px;object-fit:cover;display:block}
    .gallery-thumbs{display:flex;gap:8px;padding:10px;background:rgba(0,0,0,.3);overflow-x:auto}
    .gallery-thumb{width:80px;height:56px;border-radius:8px;object-fit:cover;cursor:pointer;border:2px solid transparent;transition:var(--transition-fast);flex-shrink:0}
    .gallery-thumb.active,.gallery-thumb:hover{border-color:var(--primary)}
    .detail-layout{display:grid;grid-template-columns:1fr 380px;gap:32px;align-items:start}
    @media(max-width:900px){.detail-layout{grid-template-columns:1fr}}
    .sticky-sidebar{position:sticky;top:100px}
    .amenity-chip{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:100px;font-size:12px;font-weight:500;color:var(--text-secondary);margin:4px}
    .slot-card-detail{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:20px;margin-bottom:16px;transition:var(--transition)}
    .slot-card-detail:hover{border-color:rgba(0,255,136,.15);background:var(--bg-card-hover)}
    .sidebar-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:20px}
    .owner-view-panel{margin-top:12px;background:rgba(255,107,53,.05);border:1px solid rgba(255,107,53,.15);border-radius:var(--radius-sm);overflow:hidden}
    .owner-view-toggle{display:flex;align-items:center;gap:8px;padding:10px 16px;font-size:13px;font-weight:700;color:var(--secondary);cursor:pointer;text-transform:uppercase;letter-spacing:.5px}
    .owner-members-list{display:none;flex-direction:column}
    .owner-members-list.open{display:flex}
    .owner-member-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-top:1px solid rgba(255,255,255,.05)}
    .back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--text-muted);font-size:14px;margin-bottom:24px;cursor:pointer;transition:var(--transition-fast)}
    .back-btn:hover{color:var(--primary)}
    .loading-spinner{display:flex;justify-content:center;align-items:center;padding:60px;font-size:14px;color:var(--text-muted);}
  </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-orbs"><div class="bg-orb bg-orb-1" style="opacity:.06;"></div></div>

<nav class="navbar scrolled">
  <div class="container navbar-inner">
    <a href="index.html" class="nav-logo">
      <img src="assets/logo.svg" alt="PlayMate" style="height:36px;width:auto;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div style="display:none;align-items:center;gap:8px;"><div class="nav-logo-icon">PM</div><span class="nav-logo-text">Play<span>Mate</span></span></div>
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="venues.html" class="nav-link">Browse Venues</a>
      <a href="add-venue.html" class="nav-link">Add Venue</a>
      <a href="profile.html" class="nav-link">My Profile</a>
    </div>
    <div class="nav-actions" id="nav-actions"></div>
  </div>
</nav>

<div class="page-wrapper">
  <div class="detail-page">
    <div class="container">
      <div class="back-btn" onclick="history.back()">← Back to Venues</div>
      <div id="venue-detail-content"><div class="loading-spinner">⏳ Loading venue…</div></div>
    </div>
  </div>
</div>

<!-- JOIN SLOT MODAL -->
<div class="modal-overlay" id="join-modal" style="display:none;">
  <div class="modal">
    <div class="modal-header"><h2 class="modal-title">Join Slot</h2><button class="modal-close" onclick="UI.closeModal('join-modal')">×</button></div>
    <div id="join-modal-body"></div>
    <div style="display:flex;gap:12px;margin-top:24px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="UI.closeModal('join-modal')">Cancel</button>
      <button class="btn btn-primary" style="flex:2;" onclick="confirmJoin()" id="confirm-join-btn">✋ Confirm Join</button>
    </div>
  </div>
</div>

<!-- ADD SLOT MODAL -->
<div class="modal-overlay" id="add-slot-modal" style="display:none;">
  <div class="modal">
    <div class="modal-header"><h2 class="modal-title">➕ Add New Slot</h2><button class="modal-close" onclick="UI.closeModal('add-slot-modal')">×</button></div>
    <form id="add-slot-form" onsubmit="submitAddSlot(event)">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Date *</label><input type="date" class="form-input" id="slot-date" required></div>
        <div class="form-group"><label class="form-label">Price (₹)</label><input type="number" class="form-input" id="slot-price" placeholder="0 = Free" min="0"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Start Time *</label><input type="time" class="form-input" id="slot-start" required></div>
        <div class="form-group"><label class="form-label">End Time *</label><input type="time" class="form-input" id="slot-end" required></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Min Members *</label><input type="number" class="form-input" id="slot-min" min="2" max="50" placeholder="e.g. 6" required></div>
        <div class="form-group"><label class="form-label">Max Members *</label><input type="number" class="form-input" id="slot-max" min="2" max="50" placeholder="e.g. 10" required></div>
      </div>
      <div style="display:flex;gap:12px;margin-top:8px;">
        <button type="button" class="btn btn-ghost" style="flex:1;" onclick="UI.closeModal('add-slot-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary" style="flex:2;" id="add-slot-btn">➕ Add Slot</button>
      </div>
    </form>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const venueId = params.get('id');
  let currentVenue = null;
  let currentUser  = null;
  let currentSlots = [];
  let joiningSlotId = null;

  async function loadPage() {
    currentUser = API.getCachedUser();
    if (currentUser) {
      try { currentUser = await API.getMe(); } catch {}
    }
    try {
      currentVenue = await API.getVenue(venueId);
      currentSlots = await API.getSlots(venueId);
      renderPage();
    } catch(e) {
      document.getElementById('venue-detail-content').innerHTML = `
        <div class="empty-state"><div class="empty-state-icon">🏟️</div>
        <div class="empty-state-title">Venue not found</div>
        <p class="empty-state-desc">Could not load venue. Make sure the Flask server is running.</p>
        <a href="venues.html" class="btn btn-primary" style="margin-top:16px;">← Browse Venues</a></div>`;
    }
  }

  function renderPage() {
    const isOwner = currentUser && currentUser.id === currentVenue.owner_id;
    const owner   = currentVenue.owner;
    const photos  = currentVenue.photos?.length ? currentVenue.photos : ['https://images.unsplash.com/photo-1529900748604-07564a03e7a6?w=800&q=80'];
    document.title = `${currentVenue.name} | PlayMate`;

    const slots = [...currentSlots].sort((a,b) => {
      if (a.date !== b.date) return a.date.localeCompare(b.date);
      return a.startTime.localeCompare(b.startTime);
    });

    document.getElementById('venue-detail-content').innerHTML = `
      <div class="gallery-wrap">
        <img src="${photos[0]}" alt="${currentVenue.name}" class="gallery-main-img" id="main-photo">
        ${photos.length > 1 ? `<div class="gallery-thumbs">${photos.map((p,i)=>`<img src="${p}" class="gallery-thumb ${i===0?'active':''}" onclick="switchPhoto('${p}',this)" alt="Photo ${i+1}">`).join('')}</div>` : ''}
      </div>

      <div class="detail-layout">
        <div>
          <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px;">
            <span class="badge badge-sport" style="font-size:14px;padding:6px 14px;">${UI.sportEmoji(currentVenue.sportType)} ${currentVenue.sportType}</span>
            ${isOwner ? `<span class="badge" style="background:rgba(255,107,53,.1);color:var(--secondary);border-color:rgba(255,107,53,.3);">🏆 Your Venue</span>` : ''}
          </div>
          <h1 style="font-size:clamp(28px,4vw,44px);font-weight:900;margin-bottom:10px;">${currentVenue.name}</h1>
          <div style="font-size:15px;color:var(--text-muted);margin-bottom:24px;">📍 ${currentVenue.location}</div>
          <div style="font-size:15px;color:var(--text-secondary);line-height:1.8;margin-bottom:28px;">${currentVenue.description || ''}</div>

          ${currentVenue.amenities?.length ? `
          <div style="margin-bottom:32px;">
            <div style="font-size:13px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;">Amenities</div>
            <div style="display:flex;flex-wrap:wrap;gap:6px;">${currentVenue.amenities.map(a=>`<span class="amenity-chip">✓ ${a}</span>`).join('')}</div>
          </div>` : ''}

          <!-- SLOTS -->
          <div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
              <div><h2 style="font-size:22px;font-weight:800;">Available Slots</h2><p style="font-size:13px;color:var(--text-muted);margin-top:4px;">Join a slot to secure your spot 🎯</p></div>
              ${isOwner ? `<button class="btn btn-primary btn-sm" onclick="UI.openModal('add-slot-modal')">+ Add Slot</button>` : ''}
            </div>
            <div id="slots-list">${renderSlotsHTML(slots, isOwner)}</div>
          </div>
        </div>

        <!-- SIDEBAR -->
        <div class="sticky-sidebar">
          <div class="sidebar-card">
            <div style="font-size:14px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px;">Venue Info</div>
            <div class="info-row"><span class="info-label">Sport</span><span class="info-value">${UI.sportEmoji(currentVenue.sportType)} ${currentVenue.sportType}</span></div>
            <div class="info-row"><span class="info-label">Location</span><span class="info-value">📍 ${currentVenue.location}</span></div>
            <div class="info-row"><span class="info-label">Price</span><span class="info-value" style="color:var(--primary);font-weight:700;">${UI.formatPrice(currentVenue.pricePerSlot)}/slot</span></div>
            <div class="info-row"><span class="info-label">Total Slots</span><span class="info-value">${slots.length}</span></div>
            <div class="info-row"><span class="info-label">Open Slots</span><span class="info-value" style="color:var(--primary);">${slots.filter(s=>s.status==='open').length}</span></div>
          </div>

          <div class="sidebar-card">
            <div style="font-size:14px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px;">Venue Owner</div>
            <div style="display:flex;align-items:center;gap:12px;">
              ${UI.avatarHTML(owner, 48)}
              <div><div style="font-weight:700;font-size:15px;">${owner?.name || 'Unknown'}</div><div style="font-size:12px;color:var(--primary);">🏆 Venue Owner</div></div>
            </div>
            ${isOwner ? `<div class="divider"></div><div style="font-size:12px;color:var(--text-muted);">📧 ${owner?.email}</div><div style="font-size:12px;color:var(--text-muted);margin-top:4px;">📞 ${currentVenue.ownerPhone}</div>` : ''}
          </div>

          ${!currentUser ? `
          <div class="sidebar-card" style="background:rgba(0,255,136,.04);border-color:rgba(0,255,136,.15);">
            <div style="text-align:center;padding:8px 0;">
              <div style="font-size:28px;margin-bottom:12px;">🔐</div>
              <div style="font-weight:700;margin-bottom:8px;">Sign in to join slots</div>
              <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">Create a free account to start playing!</p>
              <a href="login.html" class="btn btn-primary" style="width:100%;">Sign In / Register</a>
            </div>
          </div>` : ''}

          ${isOwner ? `
          <div class="sidebar-card" style="background:rgba(255,107,53,.04);border-color:rgba(255,107,53,.15);">
            <div style="font-size:14px;font-weight:700;color:var(--secondary);margin-bottom:12px;">⚙️ Manage Venue</div>
            <button class="btn btn-danger btn-sm" style="width:100%;" onclick="deleteVenueConfirm()">🗑️ Delete Venue</button>
          </div>` : ''}
        </div>
      </div>
    `;
    // Set min date
    const sd = document.getElementById('slot-date');
    if (sd) sd.min = new Date().toISOString().split('T')[0];
  }

  function renderSlotsHTML(slots, isOwner) {
    if (!slots.length) return `<div class="empty-state"><div class="empty-state-icon">📅</div><div class="empty-state-title">No slots yet</div><p class="empty-state-desc">${isOwner?'Add your first slot!':'No slots added yet.'}</p></div>`;

    return slots.map(slot => {
      const isPast    = new Date(`${slot.date}T${slot.endTime}`) < new Date();
      const cnt       = slot.memberCount;
      const needed    = Math.max(0, slot.minMembers - cnt);
      const isJoined  = slot.isJoined;
      const isFull    = cnt >= slot.maxMembers;
      const canJoin   = currentUser && !isJoined && !isFull && slot.status==='open' && !isPast;
      const pct       = Math.min((cnt/slot.maxMembers)*100,100);
      const progCls   = pct>=100?'full':pct>=60?'warning':'';

      return `
      <div class="slot-card-detail">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
          <div>
            <div style="font-size:20px;font-weight:800;">⏰ ${UI.formatTime(slot.startTime)} – ${UI.formatTime(slot.endTime)}</div>
            <div style="font-size:13px;color:var(--text-muted);margin-top:2px;">📅 ${UI.formatDate(slot.date)}</div>
          </div>
          ${UI.slotStatusBadge(slot)}
        </div>

        <div class="progress-bar" style="margin-bottom:8px;"><div class="progress-fill ${progCls}" style="width:${pct}%"></div></div>

        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px;">
          <span style="font-size:13px;color:var(--text-secondary);"><strong style="color:var(--primary);">${cnt}</strong>/${slot.maxMembers} players • Min: <strong>${slot.minMembers}</strong></span>
          ${needed>0&&slot.status==='open'?`<span class="members-need" style="font-size:12px;padding:4px 10px;background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.2);border-radius:100px;color:var(--secondary);font-weight:600;">Need ${needed} more</span>`:''}
          ${slot.status==='locked'?`<span class="badge badge-locked">🔒 Booking Confirmed!</span>`:''}
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">
          <div style="font-size:22px;font-weight:900;color:var(--primary);">${UI.formatPrice(slot.price)}</div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            ${isJoined ? `
              <span class="badge badge-open" style="font-size:12px;">✅ You're In!</span>
              ${slot.status!=='locked'?`<button class="btn btn-danger btn-sm" onclick="leaveSlot('${slot.id}')">Leave</button>`:''}
            ` : canJoin ? `
              <button class="btn btn-primary btn-sm" onclick="openJoinModal('${slot.id}')">✋ Join Slot</button>
            ` : isPast ? `
              <span style="font-size:13px;color:var(--text-muted);">Slot ended</span>
            ` : isFull ? `
              <span class="badge badge-full">⚡ Full</span>
            ` : !currentUser ? `
              <a href="login.html" class="btn btn-secondary btn-sm">Sign In to Join</a>
            ` : `<span style="font-size:13px;color:var(--text-muted);">${slot.status}</span>`}
            ${isOwner?`<button class="btn btn-ghost btn-sm" onclick="deleteSlotAction('${slot.id}')">🗑️</button>`:''}
          </div>
        </div>

        ${isOwner&&cnt>0?`
        <div class="owner-view-panel" id="owner-panel-${slot.id}">
          <div class="owner-view-toggle" onclick="toggleOwnerPanel('${slot.id}')">
            👑 View Member Contacts (${cnt}) <span style="margin-left:auto;" id="chevron-${slot.id}">▼</span>
          </div>
          <div class="owner-members-list" id="owner-list-${slot.id}">
            <div style="padding:10px 16px;font-size:12px;color:var(--text-muted);">Click to load contacts…</div>
          </div>
        </div>` : ''}
      </div>`;
    }).join('');
  }

  function switchPhoto(src, el) {
    document.getElementById('main-photo').src = src;
    document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }

  async function toggleOwnerPanel(slotId) {
    const list    = document.getElementById(`owner-list-${slotId}`);
    const chevron = document.getElementById(`chevron-${slotId}`);
    list.classList.toggle('open');
    chevron.textContent = list.classList.contains('open') ? '▲' : '▼';
    if (list.classList.contains('open') && list.children.length === 1 && list.firstChild.textContent.includes('Click')) {
      list.innerHTML = '<div style="padding:10px 16px;font-size:12px;color:var(--text-muted);">Loading…</div>';
      try {
        const data = await API.getSlotMembers(slotId);
        list.innerHTML = (data.memberDetails || []).map(u => `
          <div class="owner-member-row">
            ${UI.avatarHTML(u, 36)}
            <div><div style="font-size:14px;font-weight:600;">${u.name}</div>
            <div style="font-size:12px;color:var(--text-muted);">📧 ${u.email} • 📞 ${u.phone}</div></div>
          </div>`).join('') || '<div style="padding:10px 16px;font-size:12px;color:var(--text-muted);">No members yet.</div>';
      } catch(e) { list.innerHTML = `<div style="padding:10px 16px;font-size:12px;color:#ff4444;">${e.message}</div>`; }
    }
  }

  function openJoinModal(slotId) {
    if (!API.isLoggedIn()) { window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href); return; }
    joiningSlotId = slotId;
    const slot    = currentSlots.find(s => s.id === slotId);
    const needed  = Math.max(0, slot.minMembers - slot.memberCount);
    document.getElementById('join-modal-body').innerHTML = `
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:20px;margin-bottom:16px;">
        <div style="font-size:18px;font-weight:800;margin-bottom:6px;">⏰ ${UI.formatTime(slot.startTime)} – ${UI.formatTime(slot.endTime)}</div>
        <div style="font-size:14px;color:var(--text-muted);">📅 ${UI.formatDate(slot.date)}</div>
        <div style="margin-top:12px;font-size:14px;color:var(--text-secondary);">👥 ${slot.memberCount}/${slot.maxMembers} players joined • Min needed: ${slot.minMembers}</div>
        ${needed>0?`<div style="margin-top:8px;font-size:13px;color:var(--secondary);">⚠️ Need ${needed} more players to confirm this booking</div>`:`<div style="margin-top:8px;font-size:13px;color:var(--primary);">✅ Minimum reached — booking will be confirmed!</div>`}
      </div>
      <div style="font-size:14px;color:var(--text-secondary);line-height:1.6;">
        <p>💡 By joining, your <strong>phone</strong> and <strong>email</strong> will be shared with the venue owner.</p>
        <p style="margin-top:8px;">💰 Entry fee: <strong style="color:var(--primary);">${UI.formatPrice(slot.price)}</strong></p>
      </div>`;
    UI.openModal('join-modal');
  }

  async function confirmJoin() {
    if (!joiningSlotId) return;
    const btn = document.getElementById('confirm-join-btn');
    btn.textContent = 'Joining…'; btn.disabled = true;
    try {
      await API.joinSlot(joiningSlotId);
      UI.closeModal('join-modal');
      UI.toast('🎉 You joined the slot!', 'success');
      joiningSlotId = null;
      currentSlots = await API.getSlots(venueId);
      renderPage();
    } catch(e) {
      UI.toast(e.message, 'error');
      btn.textContent = '✋ Confirm Join'; btn.disabled = false;
    }
  }

  async function leaveSlot(slotId) {
    if (!confirm('Leave this slot?')) return;
    try {
      await API.leaveSlot(slotId);
      UI.toast('Left the slot.', 'info');
      currentSlots = await API.getSlots(venueId);
      renderPage();
    } catch(e) { UI.toast(e.message, 'error'); }
  }

  async function deleteSlotAction(slotId) {
    if (!confirm('Delete this slot?')) return;
    try {
      await API.deleteSlot(slotId);
      UI.toast('Slot deleted.', 'info');
      currentSlots = currentSlots.filter(s => s.id !== slotId);
      renderPage();
    } catch(e) { UI.toast(e.message, 'error'); }
  }

  async function deleteVenueConfirm() {
    if (!confirm(`Delete "${currentVenue.name}"? All slots will be removed too.`)) return;
    try {
      await API.deleteVenue(venueId);
      UI.toast('Venue deleted.', 'info');
      setTimeout(() => window.location.href = 'venues.html', 1000);
    } catch(e) { UI.toast(e.message, 'error'); }
  }

  async function submitAddSlot(e) {
    e.preventDefault();
    const btn   = document.getElementById('add-slot-btn');
    const date  = document.getElementById('slot-date').value;
    const start = document.getElementById('slot-start').value;
    const end   = document.getElementById('slot-end').value;
    const min   = parseInt(document.getElementById('slot-min').value);
    const max   = parseInt(document.getElementById('slot-max').value);
    const price = parseFloat(document.getElementById('slot-price').value) || 0;

    if (min > max) { UI.toast('Min members cannot exceed max members', 'error'); return; }
    if (start >= end) { UI.toast('End time must be after start time', 'error'); return; }

    btn.textContent = 'Adding…'; btn.disabled = true;
    try {
      await API.createSlot(venueId, { date, start_time: start, end_time: end, min_members: min, max_members: max, price });
      UI.closeModal('add-slot-modal');
      UI.toast('✅ Slot added!', 'success');
      document.getElementById('add-slot-form').reset();
      currentSlots = await API.getSlots(venueId);
      renderPage();
    } catch(e) {
      UI.toast(e.message, 'error');
      btn.textContent = '➕ Add Slot'; btn.disabled = false;
    }
  }

  if (!venueId) window.location.href = 'venues.html';
  else loadPage();
</script>
